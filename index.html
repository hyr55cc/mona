<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>دليل منى</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0f0a04;font-family:"Tajawal",system-ui,Arial,sans-serif;color:#f0e8d8}
@import url("https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700;800&display=swap");

/* ─── CORE LAYOUT ─── */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  height:52px;
  background:rgba(10,8,4,.97);
  border-bottom:1px solid rgba(201,150,60,.25);
  display:flex;align-items:center;padding:0 10px;gap:8px;
}
#map{
  position:fixed;
  top:52px;
  bottom:58px;
  left:0;right:0;
  z-index:1;
}
#bottom-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:1000;
  height:58px;
  background:rgba(10,8,4,.97);
  border-top:1px solid rgba(201,150,60,.25);
  display:flex;align-items:center;
  padding:0 4px;
}
/* safe area for iPhone */
@supports(padding-bottom:env(safe-area-inset-bottom)){
  #bottom-bar{padding-bottom:env(safe-area-inset-bottom);height:calc(58px + env(safe-area-inset-bottom))}
  #map{bottom:calc(58px + env(safe-area-inset-bottom))}
}

/* ─── TOP BAR ─── */
.tb-brand{display:flex;align-items:center;gap:7px;flex-shrink:0}
.tb-icon{font-size:22px}
.tb-title{font-size:14px;font-weight:800;color:#F0C96A;line-height:1}
#search-box{
  flex:1;display:flex;align-items:center;
  background:rgba(255,255,255,.07);border:1px solid rgba(201,150,60,.3);
  border-radius:10px;padding:0 10px;gap:6px;height:34px;
  transition:border-color .2s;
}
#search-box:focus-within{border-color:#C9963C}
#s-inp{flex:1;background:none;border:none;outline:none;color:#f0e8d8;font-family:inherit;font-size:12px;direction:rtl}
#s-inp::placeholder{color:rgba(240,232,216,.3)}
#s-clr{background:none;border:none;color:rgba(240,232,216,.4);font-size:14px;cursor:pointer;display:none;flex-shrink:0;padding:2px}
.tb-btn{
  width:34px;height:34px;border-radius:9px;flex-shrink:0;
  background:rgba(255,255,255,.06);border:1px solid rgba(201,150,60,.25);
  color:rgba(240,232,216,.7);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.tb-btn:hover,.tb-btn.on{background:#C9963C;border-color:#C9963C;color:#0f0a04}
#lang-btn{
  width:auto;padding:0 9px;font-size:11px;font-weight:800;
  background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.3);color:#93C5FD;
}
#lang-btn:hover{background:rgba(59,130,246,.25);color:#BFDBFE}

/* ─── BOTTOM BAR ─── */
.bb-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:2px;border:none;background:none;
  color:rgba(240,232,216,.35);cursor:pointer;border-radius:10px;
  padding:4px 2px;transition:all .2s;
}
.bb-btn .bi{font-size:19px;transition:transform .2s}
.bb-btn .bl{font-size:9px;font-weight:700;white-space:nowrap}
.bb-btn.on{color:#F0C96A}
.bb-btn.on .bi{transform:scale(1.1)}
/* Google Maps special */
.bb-gmap{
  flex:1.6;background:linear-gradient(135deg,#1A73E8,#0D5BC9);
  border-radius:12px;margin:4px 5px;color:#fff;
  box-shadow:0 3px 12px rgba(26,115,232,.4);
}
.bb-gmap:hover{transform:translateY(-1px)}
.bb-gmap.on{color:#fff}

/* ─── SEARCH RESULTS ─── */
#s-results{
  position:fixed;top:52px;left:0;right:0;z-index:900;
  background:rgba(10,8,4,.98);border-bottom:1px solid rgba(201,150,60,.2);
  max-height:60vh;overflow-y:auto;display:none;
}
.sr-sec{padding:8px 14px 4px;font-size:10px;font-weight:800;color:rgba(240,232,216,.35);letter-spacing:.8px;text-transform:uppercase}
.sr-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s;
}
.sr-item:hover{background:rgba(255,255,255,.04)}
.sr-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.sr-info{flex:1;min-width:0}
.sr-name{font-size:12.5px;font-weight:700;color:#f0e8d8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-sub{font-size:10px;color:rgba(240,232,216,.45);margin-top:2px}
.sr-dist{font-size:10px;font-weight:700;color:#C9963C;flex-shrink:0}
.sr-go{
  background:#22C55E;border:none;border-radius:8px;
  padding:6px 10px;color:#fff;font-size:11px;font-weight:800;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
}

/* ─── PANEL (slide from right) ─── */
#panel-overlay{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.5);display:none}
#panel{
  position:fixed;top:0;right:0;bottom:0;z-index:900;
  width:min(300px,90vw);
  background:#121018;
  border-left:1px solid rgba(201,150,60,.2);
  display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
}
#panel.open{transform:translateX(0)}
.panel-head{
  padding:12px 14px 0;flex-shrink:0;
  background:linear-gradient(180deg,rgba(201,150,60,.05),transparent);
}
.ph-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ph-top h2{font-size:14px;font-weight:800;color:#F0C96A}
.ph-close{background:#1e1a12;border:1px solid rgba(201,150,60,.2);border-radius:8px;width:28px;height:28px;color:rgba(240,232,216,.5);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.p-tabs{display:flex;background:#0f0a04;border-radius:10px;padding:3px;gap:2px;margin-bottom:12px}
.ptab{flex:1;padding:7px 4px;border:none;background:none;border-radius:8px;font-size:11px;font-weight:700;color:rgba(240,232,216,.4);cursor:pointer;transition:all .2s;font-family:inherit}
.ptab.on{background:#1e1a12;color:#F0C96A;box-shadow:0 2px 6px rgba(0,0,0,.3)}
/* panel scroll area */
.p-body{flex:1;overflow-y:auto;padding:0 10px 10px}
.p-body::-webkit-scrollbar{width:3px}
.p-body::-webkit-scrollbar-thumb{background:rgba(201,150,60,.3);border-radius:2px}

/* ─── CAMP SEARCH ─── */
.cs-inp{
  display:flex;align-items:center;gap:7px;
  background:#1a1410;border:1px solid rgba(201,150,60,.25);
  border-radius:10px;padding:9px 11px;margin-bottom:8px;
}
.cs-inp:focus-within{border-color:#C9963C}
.cs-inp input{flex:1;background:none;border:none;outline:none;color:#f0e8d8;font-size:13px;direction:rtl;font-family:inherit}
.cs-inp input::placeholder{color:rgba(240,232,216,.3)}
.sel-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.msel{
  background:#1a1410;border:1px solid rgba(201,150,60,.2);
  border-radius:9px;padding:8px 9px;color:#f0e8d8;
  font-size:11.5px;direction:rtl;outline:none;width:100%;font-family:inherit;
}
.msel:focus{border-color:#C9963C}
.msel option{background:#121018}
.btn-row{display:flex;gap:6px}
.btn-gold{
  background:#C9963C;border:none;border-radius:9px;
  padding:9px 14px;color:#0f0a04;font-weight:800;font-size:12px;
  cursor:pointer;transition:all .2s;white-space:nowrap;font-family:inherit;flex-shrink:0;
}
.btn-gold:hover{background:#F0C96A}

/* CAMP CARD */
.cc{
  background:#1a1410;border:1px solid rgba(201,150,60,.15);
  border-radius:12px;padding:11px;margin-bottom:6px;cursor:pointer;transition:all .15s;
}
.cc:hover,.cc.on{border-color:#C9963C;background:rgba(201,150,60,.07)}
.cc-top{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.cc-lbl{font-size:12.5px;font-weight:800;color:#f0e8d8}
.cc-zone{display:inline-block;font-size:9px;font-weight:700;background:rgba(201,150,60,.12);border:1px solid rgba(201,150,60,.25);color:#C9963C;border-radius:5px;padding:1px 6px;margin-top:3px}
.cc-dist{font-size:10px;font-weight:700;color:#C9963C;margin-bottom:6px}
.cc-acts{display:flex;gap:5px}
.cca{
  flex:1;padding:7px;border-radius:8px;border:none;font-size:11px;font-weight:800;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;font-family:inherit;
}
.cca.nav{background:#22C55E;color:#fff}
.cca.gm{background:#1A73E8;color:#fff}
.cca.pin{background:rgba(201,150,60,.15);border:1px solid rgba(201,150,60,.3);color:#F0C96A}

/* PLACE ITEM */
.pl{
  display:flex;align-items:center;gap:9px;
  padding:9px 10px;border-radius:10px;cursor:pointer;
  border:1px solid transparent;margin-bottom:2px;transition:all .15s;
}
.pl:hover{background:#1a1410;border-color:rgba(201,150,60,.2)}
.pl-ico{width:36px;height:36px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:17px}
.pl-d{flex:1;min-width:0}
.pl-n{font-size:12.5px;font-weight:700;color:#f0e8d8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-s{font-size:10px;color:rgba(240,232,216,.45);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-go{background:none;border:1px solid rgba(201,150,60,.25);border-radius:8px;padding:5px 9px;color:rgba(240,232,216,.5);font-size:11px;cursor:pointer;flex-shrink:0;transition:all .15s;font-family:inherit}
.pl-go:hover{border-color:#22C55E;color:#22C55E}
/* chips */
.chips{display:flex;gap:5px;overflow-x:auto;padding:0 0 8px;flex-wrap:nowrap}
.chips::-webkit-scrollbar{display:none}
.chip{background:#1a1410;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:4px 11px;font-size:11px;color:rgba(240,232,216,.5);cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;font-family:inherit}
.chip.on{background:rgba(201,150,60,.15);border-color:#C9963C;color:#F0C96A}

/* ─── ROUTE PANEL ─── */
#route-panel{
  position:fixed;bottom:58px;left:0;right:0;z-index:700;
  background:rgba(10,8,4,.98);border-top:1px solid rgba(201,150,60,.2);
  padding:10px 12px;
  transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
}
#route-panel.show{transform:translateY(0)}
.rp-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rp-lbl{font-size:11px;font-weight:700;color:rgba(240,232,216,.5);flex-shrink:0}
.rp-sel{
  flex:1;min-width:110px;background:#1a1410;border:1px solid rgba(201,150,60,.2);
  border-radius:9px;padding:7px 9px;color:#f0e8d8;font-size:11px;direction:rtl;outline:none;font-family:inherit;
}
.rp-sel:focus{border-color:#C9963C}
.rp-sel option{background:#121018}
.rp-go{
  background:#22C55E;border:none;border-radius:10px;
  padding:9px 16px;color:#fff;font-weight:800;font-size:13px;cursor:pointer;
  transition:all .2s;white-space:nowrap;font-family:inherit;
}
.rp-clr{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:9px;padding:8px 11px;color:#FCA5A5;font-size:11px;cursor:pointer;font-family:inherit}

/* ─── ROUTE RESULT ─── */
#route-result{
  position:fixed;left:10px;top:62px;z-index:600;
  background:rgba(10,8,4,.97);border:1px solid rgba(255,255,255,.12);
  border-radius:14px;padding:12px;min-width:200px;display:none;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
}
.rr-h{font-size:11px;font-weight:800;color:#22C55E;margin-bottom:8px}
.rr-r{display:flex;align-items:center;gap:7px;font-size:12px;color:#f0e8d8;margin-bottom:4px}
#btn-gmaps{
  display:flex;align-items:center;justify-content:center;gap:7px;
  margin-top:9px;width:100%;padding:10px;
  background:linear-gradient(135deg,#1A73E8,#0D5BC9);
  border:none;border-radius:10px;color:#fff;font-family:inherit;
  font-size:12px;font-weight:800;cursor:pointer;text-decoration:none;
  transition:all .2s;box-shadow:0 4px 12px rgba(26,115,232,.4);
}
#btn-gmaps:hover{transform:translateY(-1px)}
#btn-clr{display:block;margin-top:6px;width:100%;padding:6px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.18);border-radius:8px;color:#FCA5A5;font-size:11px;cursor:pointer;font-family:inherit}

/* steps */
#route-steps{
  position:fixed;left:10px;top:230px;z-index:600;
  background:rgba(10,8,4,.97);border:1px solid rgba(255,255,255,.1);
  border-radius:14px;padding:10px;max-width:230px;max-height:170px;overflow-y:auto;
  display:none;box-shadow:0 8px 32px rgba(0,0,0,.6);
}
.st{display:flex;align-items:flex-start;gap:6px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:10.5px;color:rgba(240,232,216,.7)}
.st:last-child{border:none}
.stn{width:16px;height:16px;border-radius:50%;background:rgba(201,150,60,.12);border:1px solid rgba(201,150,60,.3);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#C9963C;flex-shrink:0}
.std{color:rgba(240,232,216,.35);font-size:9px;white-space:nowrap;margin-right:auto;flex-shrink:0}

/* ─── FLOAT BTNS ─── */
#flt{position:fixed;left:10px;bottom:70px;z-index:600;display:flex;flex-direction:column;gap:8px}
.fb{
  width:42px;height:42px;border-radius:12px;
  background:rgba(10,8,4,.92);border:1px solid rgba(201,150,60,.3);
  backdrop-filter:blur(8px);color:rgba(240,232,216,.6);font-size:17px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(0,0,0,.5);transition:all .2s;
}
.fb:hover{background:rgba(201,150,60,.2);border-color:#C9963C;color:#f0e8d8}
.fb.on{background:#C9963C;border-color:#C9963C;color:#0f0a04}

/* ─── SOS ─── */
#sos{
  position:fixed;right:10px;bottom:70px;z-index:600;
  background:rgba(239,68,68,.88);border:1.5px solid #EF4444;
  border-radius:11px;padding:8px 11px;cursor:pointer;
  box-shadow:0 4px 14px rgba(239,68,68,.4);transition:all .2s;
}
#sos:hover{transform:scale(1.04)}
#sos h4{font-size:10px;font-weight:800;color:#fff}
#sos p{font-size:9px;color:rgba(255,255,255,.7);margin-top:1px}

/* ─── TOAST ─── */
#toast{
  position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:1500;
  background:rgba(10,8,4,.97);border:1px solid rgba(201,150,60,.3);
  border-radius:12px;padding:9px 16px;font-size:12px;font-weight:600;
  min-width:190px;max-width:85%;text-align:center;
  opacity:0;transition:opacity .3s;pointer-events:none;
  color:#f0e8d8;box-shadow:0 6px 24px rgba(0,0,0,.55);
}

/* ─── LEAFLET OVERRIDE ─── */
.leaflet-control-zoom{border:1px solid rgba(201,150,60,.3)!important;border-radius:10px!important;overflow:hidden}
.leaflet-control-zoom a{background:rgba(10,8,4,.9)!important;color:#F0C96A!important;border-color:rgba(201,150,60,.2)!important}
.leaflet-control-zoom a:hover{background:rgba(201,150,60,.2)!important}
.leaflet-popup-content-wrapper{background:rgba(10,8,4,.97);border:1px solid #C9963C;border-radius:14px;color:#f0e8d8;direction:rtl;box-shadow:0 12px 40px rgba(0,0,0,.7)}
.leaflet-popup-tip{background:rgba(10,8,4,.97)}
.leaflet-popup-content{font-family:"Tajawal",sans-serif;margin:12px 14px}
.leaflet-control-attribution{display:none!important}
.mtt{background:rgba(10,8,4,.96)!important;border:1px solid rgba(201,150,60,.4)!important;border-radius:8px!important;color:#F0C96A!important;font-family:"Tajawal",sans-serif!important;font-size:11px!important;font-weight:700!important;padding:3px 8px!important;white-space:nowrap}
.mtt::before{border-top-color:rgba(201,150,60,.4)!important}
@keyframes campbounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.cpin{animation:campbounce 2s ease-in-out infinite;text-align:center}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="tb-brand" onclick="centerMina()">
    <span class="tb-icon">🕋</span>
    <span class="tb-title" id="t-title">منى</span>
  </div>
  <div id="search-box">
    <span style="font-size:14px;color:rgba(240,232,216,.35)">🔍</span>
    <input id="s-inp" type="text" placeholder="ابحث عن مخيمك..." oninput="onSearch(this.value)" onfocus="onSFocus()" autocomplete="off" dir="rtl">
    <button id="s-clr" onclick="clearSearch()">✕</button>
  </div>
  <button id="lang-btn" class="tb-btn" onclick="toggleLang()">EN</button>
  <button class="tb-btn" onclick="locateMe()" id="tb-loc">📍</button>
  <button class="tb-btn" onclick="togglePanel()" id="tb-menu">☰</button>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- SEARCH RESULTS -->
<div id="s-results"></div>

<!-- FLOAT BUTTONS -->
<div id="flt">
  <button class="fb" onclick="locateMe()" id="flt-loc">📍</button>
  <button class="fb" onclick="centerMina()">🗺️</button>
</div>

<!-- SOS -->
<div id="sos" onclick="showSOS()">
  <h4 id="sos-t">🆘 طوارئ</h4>
  <p id="sos-s">اضغط للأرقام</p>
</div>

<!-- ROUTE RESULT -->
<div id="route-result">
  <div class="rr-h">✅ <span id="rr-title">المسار</span></div>
  <div class="rr-r">📏 <span id="rr-dist">-</span></div>
  <div class="rr-r">⏱️ <span id="rr-time">-</span></div>
  <div class="rr-r">🚶 <span id="rr-walk">مسار المشاة</span></div>
  <a id="btn-gmaps" href="#" target="_blank" rel="noopener">
    <svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="white"/></svg>
    <span id="gmaps-txt">فتح في Google Maps</span>
  </a>
  <button id="btn-clr" onclick="clearRoute()">✖ مسح</button>
</div>
<div id="route-steps"></div>

<!-- ROUTE PANEL -->
<div id="route-panel">
  <div class="rp-row">
    <span class="rp-lbl" id="rp-fl">🟢 من:</span>
    <select class="rp-sel" id="rp-from"><option value="">البداية</option><option value="me">📍 موقعي</option></select>
    <span class="rp-lbl" id="rp-tl">🔴 إلى:</span>
    <select class="rp-sel" id="rp-to"><option value="">الوجهة</option></select>
    <button class="rp-go" onclick="calcRoute()" id="rp-go">🧭 احسب</button>
    <button class="rp-clr" onclick="clearRoute()">✖</button>
  </div>
</div>

<!-- PANEL -->
<div id="panel-overlay" onclick="closePanel()"></div>
<div id="panel">
  <div class="panel-head">
    <div class="ph-top">
      <h2 id="ph-title">دليل منى</h2>
      <button class="ph-close" onclick="closePanel()">✕</button>
    </div>
    <div class="p-tabs">
      <button class="ptab on" onclick="ptab('camp',this)" id="pt-camp">⛺ مخيمي</button>
      <button class="ptab" onclick="ptab('places',this)" id="pt-places">📌 المواقع</button>
      <button class="ptab" onclick="ptab('route',this)" id="pt-route">🧭 طريق</button>
    </div>
  </div>

  <!-- CAMP TAB -->
  <div id="pv-camp" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div style="padding:0 10px 8px;flex-shrink:0">
      <div class="cs-inp">
        <span style="color:rgba(240,232,216,.35);font-size:14px">🔍</span>

const zSt={},stC={};
function buildCampIndex(){
  CAMPS.forEach(c=>{
    if(!zSt[c.z])zSt[c.z]=new Set();
    zSt[c.z].add(c.st);
    const k=`${c.z}|${c.st}`;
    if(!stC[k])stC[k]=[];
    stC[k].push(c);
  });
}
function onZoneChange(){

  [...(zSt[z]||[])].sort((a,b)=>a-b).forEach(s=>ss.add(new Option(`ش${s}`,s)));
}
function onStreetChange(){
  const z=document.getElementById('cs-zone').value, st=document.getElementById('cs-st').value;
  const sc=document.getElementById('cs-camp');
  sc.innerHTML='<option value="">المخيم</option>';
  if(!z||!st)return;

let lastCampResults=[];
function campSearch(q){
  q=q.trim();
  if(!q){renderCampList([]);return;}
  const nums=(q.match(/\d+/g)||[]).map(Number);
  let res=[];
  if(nums.length>=2){const[a,b]=nums;res=CAMPS.filter(c=>(c.st===a&&c.c===b)||(c.st===b&&c.c===a));}
  else if(nums.length===1){const n=nums[0];res=n>=100?CAMPS.filter(c=>c.st===n).slice(0,25):CAMPS.filter(c=>c.c===n).slice(0,25);}
  renderCampList(res);
  if(res.length===1)showCamp(res[0]);
}

function onSearch(q){
  document.getElementById('s-clr').style.display=q?'block':'none';
  if(!q){document.getElementById('s-results').style.display='none';return;}
  const low=q.toLowerCase();
  const nums=(q.match(/\d+/g)||[]).map(Number);
  let camps=[];
  if(nums.length>=2){const[a,b]=nums;camps=CAMPS.filter(c=>(c.st===a&&c.c===b)||(c.st===b&&c.c===a));}
  else if(nums.length===1){const n=nums[0];camps=n>=100?CAMPS.filter(c=>c.st===n).slice(0,6):CAMPS.filter(c=>c.c===n).slice(0,6);}
  const places=PLACES.filter(p=>p.ar.includes(q)||p.en.toLowerCase().includes(low)).slice(0,6);
  buildSearchDrop(camps,places);
}
function onSFocus(){
  // Show nearest places on focus
  if(!document.getElementById('s-inp').value){
    buildNearestDrop();
  }
}
function buildNearestDrop(){
  const el=document.getElementById('s-results');
  let list=myPos?[...PLACES].map(p=>({...p,d:myPos.distanceTo(L.latLng(p.lat,p.lng))})).sort((a,b)=>a.d-b.d).slice(0,8):PLACES.slice(0,8);
  const ar=lang==='ar';
  el.innerHTML=`<div class="sr-sec">${ar?'📌 أقرب المواقع إليك':'📌 NEAREST PLACES'}</div>`+
    list.map(p=>{
      const nm=ar?p.ar:p.en, du=makeDest(p.lat,p.lng);
      const dist=myPos&&p.d?`<div class="sr-dist">${fDist(p.d)}</div>`:'';
      return`<div class="sr-item" onclick="flyToPlace('${p.id}');clearSearch()">
        <div class="sr-ico" style="background:${p.color}15;border:1px solid ${p.color}30">${p.icon}</div>
        <div class="sr-info"><div class="sr-name">${nm}</div><div class="sr-sub">${ar?p.arD:p.enD}</div></div>
        ${dist}
        <button class="sr-go" onclick="event.stopPropagation();routeToPlace('${p.id}');clearSearch()">🧭</button>
      </div>`;
    }).join('');
  el.style.display='block';
}
function buildSearchDrop(camps,places){
  const el=document.getElementById('s-results');
  if(!camps.length&&!places.length){el.style.display='none';return;}
  const ar=lang==='ar'; let html='';
  if(camps.length){
    html+=`<div class="sr-sec">${ar?'⛺ المخيمات':'⛺ CAMPS'}</div>`;
    html+=camps.slice(0,5).map(c=>{
      const lbl=tf('cLabel',c.z,c.st,c.c);
      const dist=myPos?`<div class="sr-dist">${fDist(myPos.distanceTo(L.latLng(c.lat,c.lng)))}</div>`:'';
      const cj=JSON.stringify(c).replace(/"/g,"'");
      return`<div class="sr-item" onclick="showCamp(${cj});clearSearch()">
        <div class="sr-ico" style="background:rgba(201,150,60,.12);border:1px solid rgba(201,150,60,.25)">⛺</div>
        <div class="sr-info"><div class="sr-name">${lbl}</div><div class="sr-sub">${TX[lang].zn[c.z]||c.z}</div></div>
        ${dist}
        <button class="sr-go" onclick="event.stopPropagation();navCamp(${cj});clearSearch()">🧭</button>
      </div>`;
    }).join('');
  }
  if(places.length){
    html+=`<div class="sr-sec">${ar?'📌 المواقع':'📌 PLACES'}</div>`;
    html+=places.map(p=>{
      const nm=ar?p.ar:p.en;
      const dist=myPos?`<div class="sr-dist">${fDist(myPos.distanceTo(L.latLng(p.lat,p.lng)))}</div>`:'';
      return`<div class="sr-item" onclick="flyToPlace('${p.id}');clearSearch()">
        <div class="sr-ico" style="background:${p.color}15;border:1px solid ${p.color}30">${p.icon}</div>
        <div class="sr-info"><div class="sr-name">${nm}</div><div class="sr-sub">${ar?p.arD:p.enD}</div></div>
        ${dist}
        <button class="sr-go" onclick="event.stopPropagation();routeToPlace('${p.id}');clearSearch()">🧭</button>
      </div>`;
    }).join('');
  }
  el.innerHTML=html; el.style.display='block';
}
function clearSearch(){
  document.getElementById('s-inp').value='';
  document.getElementById('s-clr').style.display='none';
  document.getElementById('s-results').style.display='none';

// ── GEOLOCATION ──
function locateMe(){
  if(!navigator.geolocation){toast('Geolocation not supported',3000);return;}
  const locs=[document.getElementById('tb-loc'),document.getElementById('flt-loc')];
  locs.forEach(b=>{if(b)b.style.opacity='.4';});
  toast(t('locating'),9000);
  navigator.geolocation.getCurrentPosition(
    pos=>{
      const ll=L.latLng(pos.coords.latitude,pos.coords.longitude);
      myPos=ll; setMyMarker(ll);
      map.flyTo(ll,17,{duration:1.5});
      locs.forEach(b=>{if(b){b.style.opacity='1';b.classList.add('on');}});
      toast(t('locOK'));
      const sel=document.getElementById('rp-from');
      if(!sel.querySelector('option[value="me"]'))sel.insertBefore(new Option('📍 '+t('myPos'),'me'),sel.options[1]);
      ['rp-from','rp2-from'].forEach(id=>{
        const s=document.getElementById(id);if(!s)return;
        if(!s.querySelector('option[value="me"]'))s.insertBefore(new Option('📍 '+t('myPos'),'me'),s.options[1]);
      });
    },
    ()=>{locs.forEach(b=>{if(b)b.style.opacity='1';});toast(t('locFail'),4000);},
    {enableHighAccuracy:true,timeout:14000,maximumAge:0}
  );
}
function setMyMarker(ll){
  if(myMarker)map.removeLayer(myMarker);
  if(myCircle)map.removeLayer(myCircle);
  const ico=L.divIcon({html:`<div style="width:20px;height:20px;border-radius:50%;background:#3B82F6;border:3px solid #fff;box-shadow:0 0 0 6px rgba(59,130,246,.2),0 3px 10px rgba(0,0,0,.5)"></div>`,className:'',iconSize:[20,20],iconAnchor:[10,10]});
  myMarker=L.marker(ll,{icon:ico,zIndexOffset:1000}).addTo(map)
    .bindPopup(`<div style="text-align:center;font-family:'Tajawal',sans-serif"><div style="font-size:22px">📍</div><div style="font-weight:800;color:#F0C96A;font-size:13px">${t('myPos')}</div><div style="font-size:10px;color:rgba(240,232,216,.4);margin-top:3px">${ll.lat.toFixed(5)}, ${ll.lng.toFixed(5)}</div></div>`);
  myCircle=L.circle(ll,{radius:40,color:'#3B82F6',fillColor:'#3B82F6',fillOpacity:.1,weight:1.5,dashArray:'4 4'}).addTo(map);
}

// ── GOOGLE MAPS URLS ──
function makeDest(lat,lng){
  // FIXED: always generates correct walking directions URL
  if(myPos){
    return`https://www.google.com/maps/dir/?api=1&origin=${myPos.lat},${myPos.lng}&destination=${lat},${lng}&travelmode=walking`;
  }
  return`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=walking`;
}
function makeRoute(f,t_){
  return`https://www.google.com/maps/dir/?api=1&origin=${f.lat},${f.lng}&destination=${t_.lat},${t_.lng}&travelmode=walking`;
}
function openGmaps(){
  let url;
  if(campLL) url=makeDest(campLL.lat,campLL.lng);
  else if(myPos) url=`https://www.google.com/maps/@${myPos.lat},${myPos.lng},17z`;
  else url='https://www.google.com/maps/search/مشعر+منى/@21.4155,39.8940,15z';
  window.open(url,'_blank','noopener');
}

// ── ROUTING ──
const OSRM=['https://router.project-osrm.org','https://routing.openstreetmap.de/routed-foot'];

function fillRouteSelects(){
  PLACES.forEach(p=>{
    const txt=p.icon+' '+(lang==='ar'?p.ar:p.en);
    for(const id of['rp-from','rp-to','rp2-from','rp2-to']){
      const sel=document.getElementById(id);if(!sel)continue;
      sel.add(new Option(txt,p.id));
    }
  });
}
function getLL2(val){
  if(val==='me')return myPos;
  if(val==='camp')return window._cLL||null;
  const p=PLACES.find(x=>x.id===val);
  return p?L.latLng(p.lat,p.lng):null;
}
function getLbl(val){
  if(val==='me')return t('myPos');
  if(val==='camp')return window._cLbl||t('myCamp');
  const p=PLACES.find(x=>x.id===val);
  return p?(lang==='ar'?p.ar:p.en):'';
}

async function doRoute(fv,tv){
  if(!fv||!tv){toast(t('needLoc').replace('📍 حدد','❗ اختر'),3000);return;}
  const from=getLL2(fv),to=getLL2(tv);
  if(!from){toast(t('needLoc'),3000);locateMe();return;}
  if(!to)return;
  clearRouteLines();
  const btn1=document.getElementById('rp-go'), btn2=document.getElementById('r2-go');
  [btn1,btn2].forEach(b=>{if(b){b.textContent='⏳';b.disabled=true;}});
  toast(t('routing'),10000);
  const coord=`${from.lng},${from.lat};${to.lng},${to.lat}`;
  let route=null;
  for(const srv of OSRM){
    try{
      const r=await Promise.race([
        fetch(`${srv}/route/v1/foot/${coord}?geometries=geojson&overview=full&steps=true`).then(r=>r.json()),
        new Promise((_,rej)=>setTimeout(()=>rej(),7000))
      ]);
      if(r&&r.code==='Ok'&&r.routes&&r.routes[0]){route=r.routes[0];break;}
    }catch(e){}
  }
  [btn1,btn2].forEach(b=>{if(b){b.textContent=t('go');b.disabled=false;}});
  const toName=getLbl(tv);
  if(route){
    const coords=route.geometry.coordinates.map(c=>[c[1],c[0]]);
    drawRoute(coords,from,to,toName,route.distance,route.duration,(route.legs[0]||{}).steps||[]);
  } else {
    drawStraight(from,to,toName);
  }
}
function calcRoute(){return doRoute(document.getElementById('rp-from').value,document.getElementById('rp-to').value);}
function calcRoute2(){return doRoute(document.getElementById('rp2-from').value,document.getElementById('rp2-to').value);}

function drawRoute(coords,from,to,toName,dist,dur,steps){
  clearRouteLines();
  routeLines.push(L.polyline(coords,{color:'#000',weight:11,opacity:.18,lineCap:'round',lineJoin:'round'}).addTo(map));
  routeLines.push(L.polyline(coords,{color:'#22C55E',weight:6,opacity:1,lineCap:'round',lineJoin:'round'}).addTo(map));
  routeLines.push(L.polyline(coords,{color:'#fff',weight:2,opacity:.25,dashArray:'1 14',lineCap:'round'}).addTo(map));
  addPt(from,'🟢',t('start')); addPt(to,'🔴',toName);
  map.fitBounds(L.latLngBounds(coords),{padding:[70,70]});
  const dm=fDist(dist), tm=fTime(dur);
  document.getElementById('rr-dist').textContent=t('dist')+': '+dm;
  document.getElementById('rr-time').textContent=t('time')+': ~'+tm;
  // FIXED: correct Google Maps URL with both from and to
  document.getElementById('btn-gmaps').href=makeRoute(from,to);
  document.getElementById('route-result').style.display='block';
  renderSteps(steps);
  toast(`${t('routeOK')} ${toName}: ${dm} (~${tm})`,6000);
}
function drawStraight(from,to,toName){
  clearRouteLines();
  routeLines.push(L.polyline([from,to],{color:'#F97316',weight:4,opacity:.85,dashArray:'10 8',lineCap:'round'}).addTo(map));
  addPt(from,'🟢',t('start')); addPt(to,'🔴',toName);
  map.fitBounds(L.latLngBounds([from,to]),{padding:[80,80]});
  const dist=from.distanceTo(to);
  document.getElementById('rr-dist').textContent=t('dist')+': '+fDist(dist);
  document.getElementById('rr-time').textContent='~'+Math.round(dist/80)+' '+t('min');
  document.getElementById('btn-gmaps').href=makeRoute(from,to);
  document.getElementById('route-result').style.display='block';
  document.getElementById('route-steps').style.display='none';
  toast(t('routeFail'),4000);
}
function renderSteps(steps){
  const box=document.getElementById('route-steps');
  const clean=(steps||[]).filter(s=>s.distance>10);
  if(!clean.length){box.style.display='none';return;}
  const ic={'turn':'↩','continue':'↑','arrive':'📍','depart':'▶','turn right':'↪','turn left':'↩'};
  box.style.display='block';
  box.innerHTML=`<div style="font-size:10px;font-weight:800;color:#F0C96A;margin-bottom:5px;border-bottom:1px solid rgba(255,255,255,.06);padding-bottom:4px">📋 ${lang==='ar'?'الخطوات':'Steps'}</div>`
   +clean.slice(0,8).map((s,i)=>`<div class="st"><div class="stn">${i+1}</div><div style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ic[s.maneuver?.type]||'▶'} ${s.name||s.maneuver?.type||'...'}</div><div class="std">${s.distance<1000?Math.round(s.distance)+'م':(s.distance/1000).toFixed(1)+'كم'}</div></div>`).join('');
}
function addPt(ll,e,lbl){
  const ic=L.divIcon({html:`<div style="font-size:24px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.9))">${e}</div>`,className:'',iconSize:[30,30],iconAnchor:[15,15]});
  routePts.push(L.marker(ll,{icon:ic,zIndexOffset:800}).addTo(map)
    .bindTooltip(lbl,{permanent:true,direction:'top',className:'mtt',offset:[0,-18]}));
}
function clearRouteLines(){
  routeLines.forEach(l=>map.removeLayer(l));routeLines=[];
  routePts.forEach(l=>map.removeLayer(l));routePts=[];
  document.getElementById('route-result').style.display='none';
  document.getElementById('route-steps').style.display='none';
  [document.getElementById('rp-go'),document.getElementById('r2-go')].forEach(b=>{if(b){b.textContent=t('go');b.disabled=false;}});
}
function clearRoute(){clearRouteLines();toast(lang==='ar'?'🗑️ تم مسح المسار':'🗑️ Cleared');}

// ── HELPERS ──
function fDist(d){return d<1000?Math.round(d)+' '+t('m'):(d/1000).toFixed(1)+' '+t('km');}
function fTime(s){const m=Math.round(s/60);return m<60?m+' '+t('min'):Math.floor(m/60)+t('hr')+' '+(m%60)+t('min');}

// ── UI ──
let panelOpen=false, routePanelOpen=false, activeTab='camp';

function togglePanel(tab){
  if(panelOpen&&activeTab===tab){closePanel();return;}
  panelOpen=true;
  document.getElementById('panel').classList.add('open');
  document.getElementById('panel-overlay').style.display='block';
  if(tab){ptab(tab,document.getElementById('pt-'+tab));}
  setTimeout(()=>map.invalidateSize(),300);
}
function closePanel(){
  panelOpen=false;
  document.getElementById('panel').classList.remove('open');
  document.getElementById('panel-overlay').style.display='none';
  setTimeout(()=>map.invalidateSize(),300);
}
function ptab(tab,btn){
  activeTab=tab;
  ['camp','places','route'].forEach(tv=>{
    const el=document.getElementById('pv-'+tv);
    el.style.display=tv===tab?'flex':'none';
    document.getElementById('pt-'+tv).classList.toggle('on',tv===tab);
  });
}
function showRoutePanel(){routePanelOpen=true;document.getElementById('route-panel').classList.add('show');}
function centerMina(){map.flyTo(MINA,15,{duration:1.4});}
function bbClick(tab,btn){
  document.querySelectorAll('.bb-btn:not(.bb-gmap)').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}
function showSOS(){
  alert(lang==='ar'
    ?'🆘 أرقام الطوارئ في مشعر منى\n\n🚨 الطوارئ الموحد: 911\n🚒 الدفاع المدني: 998\n🚑 الإسعاف: 997\n👮 الشرطة: 999\n🏥 وزارة الصحة: 937\n📞 وزارة الحج: 920001814'
    :'🆘 Emergency Numbers in Mina\n\n🚨 Unified Emergency: 911\n🚒 Civil Defense: 998\n🚑 Ambulance: 997\n👮 Police: 999\n🏥 MOH Hotline: 937\n📞 Min. of Hajj: 920001814'
  );
}

// ── TOAST ──
let toastT;
function toast(msg,dur=3500){
  const el=document.getElementById('toast');
  el.textContent=msg;el.style.opacity='1';
  clearTimeout(toastT);toastT=setTimeout(()=>el.style.opacity='0',dur);
}

// ── INIT ──
document.addEventListener('DOMContentLoaded',()=>{
  // Init map
  try{
    initMap();
    // Restore saved camp
    const sc=localStorage.getItem('mina_camp');
    if(sc){try{restoreSavedCamp(JSON.parse(sc));}catch(e){}}
    setTimeout(()=>toast(lang==='ar'?'🕋 مرحباً · ابحث عن مخيمك من البحث':'🕋 Welcome · Search your camp',5000),800);
  }catch(e){console.error(e);}
  // Close panels on outside click
  document.addEventListener('click',e=>{
    if(!e.target.closest('#search-box')&&!e.target.closest('#s-results')) clearSearch();
  });
  // Handle resize
  window.addEventListener('resize',()=>map&&map.invalidateSize());
});
