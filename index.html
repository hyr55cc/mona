<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>دليل الحاج · منى وعرفات</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0804;
  font-family:"Tajawal",system-ui,Arial,sans-serif;color:#f0e8d8}

/* ── SITE SWITCHER (top) ── */
#site-bar{
  position:fixed;top:0;left:0;right:0;z-index:2000;
  height:40px;
  background:#0a0804;
  border-bottom:2px solid #C9963C;
  display:flex;align-items:center;padding:0 10px;gap:6px;
}
.sb-logo{font-size:18px;flex-shrink:0}
.sb-tabs{display:flex;gap:4px;flex:1}
.sb-tab{
  flex:1;max-width:160px;padding:6px 14px;
  border:none;border-radius:8px;
  font-family:inherit;font-size:12px;font-weight:800;cursor:pointer;
  transition:all .25s;
}
.sb-tab.mina{background:rgba(201,150,60,.12);color:rgba(240,232,216,.5)}
.sb-tab.arafat{background:rgba(201,150,60,.12);color:rgba(240,232,216,.5)}
.sb-tab.on{background:#C9963C;color:#0a0804}
.sb-right{display:flex;gap:6px;flex-shrink:0}
#lang-btn{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.3);
  border-radius:7px;padding:4px 9px;color:#93C5FD;font-size:11px;font-weight:800;cursor:pointer}

/* ── TOP BAR (below site switcher) ── */
#topbar{
  position:fixed;top:40px;left:0;right:0;z-index:1000;height:48px;
  background:rgba(10,8,4,.97);border-bottom:1px solid rgba(201,150,60,.2);
  display:flex;align-items:center;padding:0 10px;gap:8px;
}
#search-box{
  flex:1;display:flex;align-items:center;
  background:rgba(255,255,255,.07);border:1px solid rgba(201,150,60,.28);
  border-radius:10px;padding:0 10px;gap:6px;height:32px;transition:border-color .2s;
}
#search-box:focus-within{border-color:#C9963C}
#s-inp{flex:1;background:none;border:none;outline:none;color:#f0e8d8;font-size:12px;direction:rtl}
#s-inp::placeholder{color:rgba(240,232,216,.3)}
#s-clr{background:none;border:none;color:rgba(240,232,216,.4);font-size:13px;cursor:pointer;display:none}
.tb-btn{width:32px;height:32px;border-radius:9px;flex-shrink:0;
  background:rgba(255,255,255,.06);border:1px solid rgba(201,150,60,.22);
  color:rgba(240,232,216,.6);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s}
.tb-btn.on,.tb-btn:hover{background:#C9963C;border-color:#C9963C;color:#0a0804}

/* ── MAP ── */
#map{position:fixed;top:88px;bottom:56px;left:0;right:0;z-index:1}
@supports(padding-bottom:env(safe-area-inset-bottom)){
  #map{bottom:calc(56px + env(safe-area-inset-bottom))}
}

/* ── BOTTOM NAV ── */
#bottom-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:1000;height:56px;
  background:rgba(10,8,4,.97);border-top:1px solid rgba(201,150,60,.2);
  display:flex;align-items:center;padding:0 4px;
  padding-bottom:max(0px,env(safe-area-inset-bottom));
}
.bb{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  border:none;background:none;color:rgba(240,232,216,.3);cursor:pointer;
  border-radius:10px;padding:4px 2px;transition:all .2s;
}
.bb .bi{font-size:18px;transition:transform .2s}
.bb .bl{font-size:9px;font-weight:700;white-space:nowrap}
.bb.on{color:#F0C96A}
.bb.on .bi{transform:scale(1.1)}
.bb-gmap{
  flex:1.6;background:linear-gradient(135deg,#1A73E8,#0D5BC9);
  border-radius:12px;margin:3px 5px;color:#fff;
  box-shadow:0 3px 10px rgba(26,115,232,.35);
}
.bb-gmap .bi{font-size:16px}
.bb-gmap .bl{font-size:10px;font-weight:800}

/* ── SEARCH RESULTS ── */
#s-results{
  position:fixed;top:88px;left:0;right:0;z-index:900;
  background:rgba(10,8,4,.98);border-bottom:1px solid rgba(201,150,60,.2);
  max-height:55vh;overflow-y:auto;display:none;
}
.sr-sec{padding:7px 14px 3px;font-size:9.5px;font-weight:800;color:rgba(240,232,216,.35);letter-spacing:.8px}
.sr-item{display:flex;align-items:center;gap:9px;padding:9px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
.sr-item:hover{background:rgba(255,255,255,.04)}
.sr-ico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sr-info{flex:1;min-width:0}
.sr-name{font-size:12px;font-weight:700;color:#f0e8d8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-sub{font-size:10px;color:rgba(240,232,216,.4);margin-top:1px}
.sr-dist{font-size:10px;font-weight:700;color:#C9963C;flex-shrink:0}
.sr-go{background:#22C55E;border:none;border-radius:7px;padding:5px 9px;color:#fff;font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap;flex-shrink:0}

/* ── PANEL ── */
#panel-ov{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.5);display:none}
#panel{
  position:fixed;top:0;right:0;bottom:0;width:min(295px,90vw);z-index:900;
  background:#111018;border-left:1px solid rgba(201,150,60,.18);
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
}
#panel.open{transform:translateX(0)}
.ph{padding:12px 12px 0;flex-shrink:0;background:linear-gradient(180deg,rgba(201,150,60,.05),transparent);border-bottom:1px solid rgba(201,150,60,.12)}
.ph-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ph-top h2{font-size:13px;font-weight:800;color:#F0C96A}
.ph-close{background:#1a1612;border:1px solid rgba(201,150,60,.2);border-radius:8px;width:27px;height:27px;color:rgba(240,232,216,.5);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.p-tabs{display:flex;background:#0a0804;border-radius:10px;padding:3px;gap:2px;margin-bottom:10px}
.ptab{flex:1;padding:6px 4px;border:none;background:none;border-radius:8px;font-size:11px;font-weight:700;color:rgba(240,232,216,.4);cursor:pointer;transition:all .2s;font-family:inherit}
.ptab.on{background:#1a1612;color:#F0C96A;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.p-body{flex:1;overflow-y:auto;padding:0 8px 8px}
.p-body::-webkit-scrollbar{width:3px}
.p-body::-webkit-scrollbar-thumb{background:rgba(201,150,60,.3);border-radius:2px}

/* CAMP SEARCH */
.cs-i{display:flex;align-items:center;gap:6px;background:#1a1612;border:1px solid rgba(201,150,60,.22);border-radius:10px;padding:8px 10px;margin-bottom:7px}
.cs-i:focus-within{border-color:#C9963C}
.cs-i input{flex:1;background:none;border:none;outline:none;color:#f0e8d8;font-size:13px;direction:rtl;font-family:inherit}
.cs-i input::placeholder{color:rgba(240,232,216,.3)}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:5px}
.msel{background:#1a1612;border:1px solid rgba(201,150,60,.18);border-radius:9px;padding:7px 8px;color:#f0e8d8;font-size:11px;direction:rtl;outline:none;width:100%;font-family:inherit}
.msel:focus{border-color:#C9963C}
.msel option{background:#111018}
.br{display:flex;gap:5px}
.bg{background:#C9963C;border:none;border-radius:9px;padding:8px 13px;color:#0a0804;font-weight:800;font-size:11.5px;cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0;transition:all .2s}
.bg:hover{background:#F0C96A}

/* CAMP CARD */
.cc{background:#1a1612;border:1px solid rgba(201,150,60,.14);border-radius:11px;padding:10px;margin-bottom:5px;cursor:pointer;transition:all .15s}
.cc:hover,.cc.on{border-color:#C9963C;background:rgba(201,150,60,.07)}
.cc-t{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.cc-l{font-size:12px;font-weight:800;color:#f0e8d8}
.cc-z{display:inline-block;font-size:9px;font-weight:700;background:rgba(201,150,60,.12);border:1px solid rgba(201,150,60,.25);color:#C9963C;border-radius:5px;padding:1px 6px;margin-top:2px}
.cc-d{font-size:10px;font-weight:700;color:#C9963C;margin-bottom:5px}
.ca{display:flex;gap:5px}
.cca{flex:1;padding:6px;border-radius:8px;border:none;font-size:11px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;font-family:inherit}
.cca.nav{background:#22C55E;color:#fff}
.cca.gm{background:#1A73E8;color:#fff}
.cca.pin{background:rgba(201,150,60,.14);border:1px solid rgba(201,150,60,.28);color:#F0C96A}

/* PLACE */
.pl{display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:10px;cursor:pointer;border:1px solid transparent;margin-bottom:2px;transition:all .15s}
.pl:hover{background:#1a1612;border-color:rgba(201,150,60,.18)}
.pl-ico{width:35px;height:35px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px}
.pl-d{flex:1;min-width:0}
.pl-n{font-size:12px;font-weight:700;color:#f0e8d8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-s{font-size:10px;color:rgba(240,232,216,.45);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-go{background:none;border:1px solid rgba(201,150,60,.22);border-radius:7px;padding:4px 8px;color:rgba(240,232,216,.5);font-size:11px;cursor:pointer;flex-shrink:0;transition:all .15s;font-family:inherit}
.pl-go:hover{border-color:#22C55E;color:#22C55E}
.chips{display:flex;gap:5px;overflow-x:auto;padding:0 0 7px;flex-wrap:nowrap}
.chips::-webkit-scrollbar{display:none}
.chip{background:#1a1612;border:1px solid rgba(255,255,255,.1);border-radius:15px;padding:4px 10px;font-size:11px;color:rgba(240,232,216,.5);cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;font-family:inherit}
.chip.on{background:rgba(201,150,60,.14);border-color:#C9963C;color:#F0C96A}

/* ROUTE PANEL */
#rp{position:fixed;bottom:56px;left:0;right:0;z-index:700;
  background:rgba(10,8,4,.98);border-top:1px solid rgba(201,150,60,.18);
  padding:9px 11px;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
#rp.show{transform:translateY(0)}
.rr{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rl{font-size:11px;font-weight:700;color:rgba(240,232,216,.45);flex-shrink:0}
.rs{flex:1;min-width:110px;background:#1a1612;border:1px solid rgba(201,150,60,.18);border-radius:9px;padding:7px 9px;color:#f0e8d8;font-size:11px;direction:rtl;outline:none;font-family:inherit}
.rs option{background:#111018}
.rgo{background:#22C55E;border:none;border-radius:10px;padding:8px 15px;color:#fff;font-weight:800;font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .2s}
.rclr{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:9px;padding:7px 10px;color:#FCA5A5;font-size:11px;cursor:pointer;font-family:inherit}

/* ROUTE RESULT */
#rr{position:fixed;left:10px;top:98px;z-index:600;
  background:rgba(10,8,4,.97);border:1px solid rgba(255,255,255,.12);
  border-radius:13px;padding:12px;min-width:200px;display:none;
  box-shadow:0 8px 30px rgba(0,0,0,.6)}
.rr-h{font-size:11px;font-weight:800;color:#22C55E;margin-bottom:7px}
.rr-r{display:flex;align-items:center;gap:6px;font-size:12px;color:#f0e8d8;margin-bottom:4px}
#btn-gm{display:flex;align-items:center;justify-content:center;gap:7px;
  margin-top:9px;width:100%;padding:9px;
  background:linear-gradient(135deg,#1A73E8,#0D5BC9);
  border:none;border-radius:10px;color:#fff;font-family:inherit;
  font-size:12px;font-weight:800;cursor:pointer;text-decoration:none;
  box-shadow:0 4px 12px rgba(26,115,232,.4);transition:all .2s}
#btn-gm:hover{transform:translateY(-1px)}
#btn-cr{display:block;margin-top:6px;width:100%;padding:6px;
  background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.18);
  border-radius:8px;color:#FCA5A5;font-size:11px;cursor:pointer;font-family:inherit}
#rsteps{position:fixed;left:10px;top:228px;z-index:600;
  background:rgba(10,8,4,.97);border:1px solid rgba(255,255,255,.1);
  border-radius:13px;padding:10px;max-width:225px;max-height:165px;overflow-y:auto;
  display:none;box-shadow:0 8px 30px rgba(0,0,0,.6)}
.st{display:flex;align-items:flex-start;gap:6px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:10.5px;color:rgba(240,232,216,.7)}
.st:last-child{border:none}
.stn{width:16px;height:16px;border-radius:50%;background:rgba(201,150,60,.12);border:1px solid rgba(201,150,60,.28);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#C9963C;flex-shrink:0}
.std{color:rgba(240,232,216,.35);font-size:9px;white-space:nowrap;margin-right:auto;flex-shrink:0}

/* FLOATS */
#flt{position:fixed;left:10px;bottom:65px;z-index:600;display:flex;flex-direction:column;gap:7px}
.fb{width:41px;height:41px;border-radius:11px;background:rgba(10,8,4,.92);
  border:1px solid rgba(201,150,60,.28);backdrop-filter:blur(8px);
  color:rgba(240,232,216,.6);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(0,0,0,.5);transition:all .2s}
.fb:hover{background:rgba(201,150,60,.18);border-color:#C9963C;color:#f0e8d8}
.fb.on{background:#C9963C;border-color:#C9963C;color:#0a0804}

/* SOS */
#sos{position:fixed;right:10px;bottom:65px;z-index:600;
  background:rgba(239,68,68,.88);border:1.5px solid #EF4444;
  border-radius:11px;padding:7px 10px;cursor:pointer;
  box-shadow:0 4px 14px rgba(239,68,68,.4);transition:all .2s}
#sos h4{font-size:10px;font-weight:800;color:#fff}
#sos p{font-size:9px;color:rgba(255,255,255,.7);margin-top:1px}

/* TOAST */
#toast{position:fixed;bottom:65px;left:50%;transform:translateX(-50%);z-index:1500;
  background:rgba(10,8,4,.97);border:1px solid rgba(201,150,60,.3);
  border-radius:12px;padding:9px 16px;font-size:12px;font-weight:600;
  min-width:180px;max-width:85%;text-align:center;
  opacity:0;transition:opacity .3s;pointer-events:none;color:#f0e8d8;
  box-shadow:0 6px 24px rgba(0,0,0,.55)}

/* Leaflet */
.leaflet-control-zoom{border:1px solid rgba(201,150,60,.3)!important;border-radius:10px!important;overflow:hidden}
.leaflet-control-zoom a{background:rgba(10,8,4,.9)!important;color:#F0C96A!important;border-color:rgba(201,150,60,.2)!important}
.leaflet-popup-content-wrapper{background:rgba(10,8,4,.97);border:1px solid #C9963C;border-radius:14px;color:#f0e8d8;direction:rtl;box-shadow:0 12px 40px rgba(0,0,0,.7)}
.leaflet-popup-tip{background:rgba(10,8,4,.97)}
.leaflet-popup-content{font-family:"Tajawal",sans-serif;margin:12px 14px}
.leaflet-control-attribution{display:none!important}
.mtt{background:rgba(10,8,4,.96)!important;border:1px solid rgba(201,150,60,.4)!important;border-radius:8px!important;color:#F0C96A!important;font-family:"Tajawal",sans-serif!important;font-size:11px!important;font-weight:700!important;padding:3px 8px!important;white-space:nowrap}
.mtt::before{border-top-color:rgba(201,150,60,.4)!important}
@keyframes cpin{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.cpin{animation:cpin 2s ease-in-out infinite;text-align:center}
@keyframes gpulse{0%,100%{filter:drop-shadow(0 0 6px gold)}50%{filter:drop-shadow(0 0 16px gold)}}
.rahma-icon{animation:gpulse 2s ease-in-out infinite}
</style>
</head>
<body>

<!-- SITE SWITCHER -->
<div id="site-bar">
  <span class="sb-logo">🕋</span>
  <div class="sb-tabs">
    <button class="sb-tab mina on" onclick="switchSite('mina',this)" id="tab-mina">
      ⛺ <span id="tl-mina">منى</span>
    </button>
    <button class="sb-tab arafat" onclick="switchSite('arafat',this)" id="tab-arafat">
      ⛰️ <span id="tl-arafat">عرفات</span>
    </button>
  </div>
  <div class="sb-right">
    <button id="lang-btn" onclick="toggleLang()">EN</button>
  </div>
</div>

<!-- TOP BAR -->
<div id="topbar">
  <div id="search-box">
    <span style="font-size:13px;color:rgba(240,232,216,.3)">🔍</span>
    <input id="s-inp" type="text" placeholder="ابحث عن مخيم أو موقع..." oninput="onSearch(this.value)" onfocus="onSFocus()" autocomplete="off" dir="rtl">
    <button id="s-clr" onclick="clearSearch()">✕</button>
  </div>
  <button class="tb-btn" onclick="locateMe()" id="tb-loc">📍</button>
  <button class="tb-btn" onclick="togglePanel()" id="tb-menu">☰</button>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- SEARCH RESULTS -->
<div id="s-results"></div>

<!-- FLOATS -->
<div id="flt">
  <button class="fb" onclick="locateMe()" id="flt-loc">📍</button>
  <button class="fb" onclick="centerCurrent()">🗺️</button>
</div>

<!-- SOS -->
<div id="sos" onclick="showSOS()">
  <h4>🆘 <span id="sos-t">طوارئ</span></h4>
  <p id="sos-s">اضغط للأرقام</p>
</div>

<!-- ROUTE RESULT -->
<div id="rr">
  <div class="rr-h">✅ <span id="rr-title">المسار</span></div>
  <div class="rr-r">📏 <span id="rr-dist">-</span></div>
  <div class="rr-r">⏱️ <span id="rr-time">-</span></div>
  <div class="rr-r">🚶 <span id="rr-walk">مسار المشاة</span></div>
  <a id="btn-gm" href="#" target="_blank" rel="noopener">
    <svg width="15" height="15" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="white"/></svg>
    <span id="gm-txt">فتح في Google Maps</span>
  </a>
  <button id="btn-cr" onclick="clearRoute()">✖ مسح</button>
</div>
<div id="rsteps"></div>

<!-- ROUTE PANEL -->
<div id="rp">
  <div class="rr">
    <span class="rl" id="rp-fl">🟢 من:</span>
    <select class="rs" id="rp-from"><option value="">البداية</option><option value="me">📍 موقعي</option></select>
    <span class="rl" id="rp-tl">🔴 إلى:</span>
    <select class="rs" id="rp-to"><option value="">الوجهة</option></select>
    <button class="rgo" onclick="calcRoute()" id="rp-go">🧭 احسب</button>
    <button class="rclr" onclick="clearRoute()">✖</button>
  </div>
</div>

<!-- PANEL -->
<div id="panel-ov" onclick="closePanel()"></div>
<div id="panel">
  <div class="ph">
    <div class="ph-top">
      <h2 id="ph-title">دليل المشاعر</h2>
      <button class="ph-close" onclick="closePanel()">✕</button>
    </div>
    <div class="p-tabs">
      <button class="ptab on" onclick="ptab('camp',this)" id="pt-camp">⛺ مخيمي</button>
      <button class="ptab" onclick="ptab('places',this)" id="pt-places">📌 المواقع</button>
      <button class="ptab" onclick="ptab('route',this)" id="pt-route">🧭 طريق</button>
    </div>
  </div>

  <!-- CAMP TAB -->
  <div id="pv-camp" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div style="padding:0 8px 7px;flex-shrink:0">
      <div class="cs-i"><span style="color:rgba(240,232,216,.3);font-size:13px">🔍</span>
        <input id="c-inp" type="text" placeholder="مثال: 900-5 أو شارع 510" oninput="campSearch(this.value)" dir="rtl"></div>
      <div class="sg">
        <select class="msel" id="cs-zone" onchange="onZC()">
          <option value="">المنطقة</option>
        </select>

const MINA_CENTER=[21.4155,39.8940];
const ARAFAT_CENTER=[21.3548,39.9840];
let currentSite='mina';
let CAMPS=MINA_CAMPS, PLACES=PLACES; // will be reassigned

function switchSite(site,btn){
  currentSite=site;
  document.querySelectorAll('.sb-tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  // Update data sources
  if(site==='mina'){
    CAMPS=MINA_CAMPS;
    PLACES=PLACES_MINA;
  } else {
    CAMPS=ARAFAT_CAMPS;
    PLACES=ARAFAT_PLACES;
  }
  // Fly to center
  map.flyTo(site==='mina'?MINA_CENTER:ARAFAT_CENTER,14,{duration:1.5});
  // Rebuild indexes and UI
  buildCampIndex();
  buildZoneOptions();
  pCat='all';
  document.querySelectorAll('#p-chips .chip').forEach(b=>b.classList.remove('on'));
  document.querySelector('#p-chips .chip').classList.add('on');
  clearPMarkers();
  renderPlaceMarkers(PLACES);
  renderPlacesList(PLACES);
  clearSearch();
  renderCampList([]);
  document.getElementById('c-inp').value='';
  toast(site==='mina'?'🕋 مشعر منى':'⛰️ مشعر عرفات · يوم الوقوف العظيم',4000);
}

  setTimeout(()=>map.invalidateSize(),100);

  window.addEventListener('resize',()=>map&&map.invalidateSize());
  renderPlaceMarkers(PLACES_MINA);

const CC={medical:'#EF4444',nusuk:'#14B8A6',security:'#8B5CF6',transport:'#3B82F6',religious:'#C9963C',service:'#22C55E'};
let pMarkers={},pCat='all',curPlaces=PLACES_MINA;

function clearPMarkers(){Object.values(pMarkers).forEach(m=>map.removeLayer(m));pMarkers={};}

function pIco(p){
  const c=CC[p.cat]||'#C9963C';
  // Special for Arafat mountain
  if(p.id==='ar_rahman') return L.divIcon({
    html:`<div class="rahma-icon" style="font-size:28px;filter:drop-shadow(0 3px 8px rgba(0,0,0,.8))">⛰️</div>`,
    className:'',iconSize:[36,36],iconAnchor:[18,18],popupAnchor:[0,-20]
  });
  return L.divIcon({
    html:`<div style="width:33px;height:33px;border-radius:50%;background:${c}1e;border:2.5px solid ${c};display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 3px 10px rgba(0,0,0,.6)">${p.icon}</div>`,
    className:'',iconSize:[33,33],iconAnchor:[16,16],popupAnchor:[0,-18]
  });
}

function renderPlaceMarkers(list){
  clearPMarkers();
  list.forEach(p=>{
    if(pCat!=='all'&&p.cat!==pCat)return;
    const m=L.marker([p.lat,p.lng],{icon:pIco(p)}).addTo(map);
    m.bindPopup(mkPop(p),{maxWidth:275});
    m.on('click',()=>hlPI(p.id));
    pMarkers[p.id]=m;
  });
}
function mkPop(p){
  const nm=lang==='ar'?p.ar:p.en, info=lang==='ar'?p.arI:p.enI;
  const du=mDest(p.lat,p.lng);
  return`<div style="direction:${lang==='ar'?'rtl':'ltr'}">
    <div style="display:flex;align-items:center;gap:9px;margin-bottom:7px">
      <span style="font-size:24px">${p.icon}</span>
      <div><div style="font-weight:800;font-size:13px;color:#F0C96A">${nm}</div>

function locateMe(){
  if(!navigator.geolocation){toast('Geolocation not supported',3000);return;}
  const bs=[document.getElementById('tb-loc'),document.getElementById('flt-loc')];
  bs.forEach(b=>{if(b)b.style.opacity='.4';});
  toast(t('locating'),9000);
  navigator.geolocation.getCurrentPosition(
    pos=>{
      const ll=L.latLng(pos.coords.latitude,pos.coords.longitude);
      myPos=ll; setMyMarker(ll);
      map.flyTo(ll,17,{duration:1.5});
      bs.forEach(b=>{if(b){b.style.opacity='1';b.classList.add('on');}});
      toast(t('locOK'));
      for(const id of['rp-from','r2-from']){
        const s=document.getElementById(id);
        if(!s.querySelector('option[value="me"]'))s.insertBefore(new Option('📍 '+t('myPos'),'me'),s.options[1]);
      }
    },
    ()=>{bs.forEach(b=>{if(b)b.style.opacity='1';});toast(t('locFail'),4000);},
    {enableHighAccuracy:true,timeout:14000,maximumAge:0}
  );
}
function setMyMarker(ll){

  myMarker=L.marker(ll,{icon:ico,zIndexOffset:1000}).addTo(map)
    .bindPopup(`<div style="text-align:center;font-family:'Tajawal',sans-serif"><div style="font-size:20px">📍</div><div style="font-weight:800;color:#F0C96A;font-size:13px">${t('myPos')}</div><div style="font-size:10px;color:rgba(240,232,216,.4)">${ll.lat.toFixed(5)}, ${ll.lng.toFixed(5)}</div></div>`);
  myCircle=L.circle(ll,{radius:40,color:'#3B82F6',fillColor:'#3B82F6',fillOpacity:.1,weight:1.5,dashArray:'4 4'}).addTo(map);

// ══════════════════════════════════════════════════════
// ROUTING (Multi-server OSRM)
// ══════════════════════════════════════════════════════
const OSRM=['https://router.project-osrm.org','https://routing.openstreetmap.de/routed-foot'];

function fillRouteSelects(){
  PLACES_MINA.forEach(p=>{
    const txt=p.icon+' '+(lang==='ar'?p.ar:p.en);
    for(const id of['rp-from','rp-to','r2-from','r2-to']){
      document.getElementById(id)?.add(new Option(txt,p.id));
    }
  });
}
function getLL(val){
  if(val==='me') return myPos;
  if(val==='camp') return window._cLL||null;
  const p=PLACES.find(x=>x.id===val)||PLACES_MINA.find(x=>x.id===val)||ARAFAT_PLACES.find(x=>x.id===val);
  return p?L.latLng(p.lat,p.lng):null;
}
function getLbl(val){
  if(val==='me') return t('myPos');
  if(val==='camp') return window._cLbl||t('myCamp');
  const p=PLACES.find(x=>x.id===val)||PLACES_MINA.find(x=>x.id===val)||ARAFAT_PLACES.find(x=>x.id===val);
  return p?(lang==='ar'?p.ar:p.en):'';
}
async function doRoute(fv,tv){
  if(!fv||!tv){toast(t('needLoc').replace('📍 حدد','❗ اختر'),3000);return;}
  const from=getLL(fv),to=getLL(tv);
  if(!from){toast(t('needLoc'),3000);locateMe();return;}
  if(!to)return;
  clearRouteLines();
  const go1=document.getElementById('rp-go'), go2=document.getElementById('r2-go');
  [go1,go2].forEach(b=>{if(b){b.textContent='⏳';b.disabled=true;}});
  toast(t('routing'),10000);
  const coord=`${from.lng},${from.lat};${to.lng},${to.lat}`;
  let route=null;
  for(const srv of OSRM){
    try{
      const r=await Promise.race([
        fetch(`${srv}/route/v1/foot/${coord}?geometries=geojson&overview=full&steps=true`).then(r=>r.json()),
        new Promise((_,rej)=>setTimeout(()=>rej(),7000))
      ]);
      if(r&&r.code==='Ok'&&r.routes&&r.routes[0]){route=r.routes[0];break;}
    }catch(e){}
  }
  [go1,go2].forEach(b=>{if(b){b.textContent=t('go');b.disabled=false;}});
  const nm=getLbl(tv);
  if(route){
    const coords=route.geometry.coordinates.map(c=>[c[1],c[0]]);
    drawRoute(coords,from,to,nm,route.distance,route.duration,(route.legs[0]||{}).steps||[]);
  } else { drawStraight(from,to,nm); }
}
function calcRoute(){return doRoute(document.getElementById('rp-from').value,document.getElementById('rp-to').value);}
function calcRoute2(){return doRoute(document.getElementById('r2-from').value,document.getElementById('r2-to').value);}

function drawRoute(coords,from,to,nm,dist,dur,steps){
  clearRouteLines();
  routeLines.push(L.polyline(coords,{color:'#000',weight:11,opacity:.18,lineCap:'round',lineJoin:'round'}).addTo(map));
  routeLines.push(L.polyline(coords,{color:'#22C55E',weight:6,opacity:1,lineCap:'round',lineJoin:'round'}).addTo(map));
  routeLines.push(L.polyline(coords,{color:'#fff',weight:2,opacity:.25,dashArray:'1 14',lineCap:'round'}).addTo(map));
  addPt(from,'🟢',t('start')); addPt(to,'🔴',nm);
  map.fitBounds(L.latLngBounds(coords),{padding:[70,70]});
  document.getElementById('rr-dist').textContent=t('dist')+': '+fDist(dist);
  document.getElementById('rr-time').textContent=t('time')+': ~'+fTime(dur);
  document.getElementById('btn-gm').href=mRoute(from,to);
  document.getElementById('rr').style.display='block';
  renderSteps(steps);
  toast(`${t('routeOK')} ${nm}: ${fDist(dist)} (~${fTime(dur)})`,6000);
}
function drawStraight(from,to,nm){
  clearRouteLines();
  routeLines.push(L.polyline([from,to],{color:'#F97316',weight:4,opacity:.85,dashArray:'10 8',lineCap:'round'}).addTo(map));
  addPt(from,'🟢',t('start')); addPt(to,'🔴',nm);
  map.fitBounds(L.latLngBounds([from,to]),{padding:[80,80]});
  const dist=from.distanceTo(to);
  document.getElementById('rr-dist').textContent=t('dist')+': '+fDist(dist);
  document.getElementById('rr-time').textContent='~'+Math.round(dist/80)+' '+t('min');
  document.getElementById('btn-gm').href=mRoute(from,to);
  document.getElementById('rr').style.display='block';
  document.getElementById('rsteps').style.display='none';
  toast(t('routeFail'),4000);
}
function renderSteps(steps){
  const box=document.getElementById('rsteps');
  const clean=(steps||[]).filter(s=>s.distance>10);
  if(!clean.length){box.style.display='none';return;}
  const ic={'turn':'↩','continue':'↑','arrive':'📍','depart':'▶','turn right':'↪','turn left':'↩'};
  box.style.display='block';
  box.innerHTML=`<div style="font-size:10px;font-weight:800;color:#F0C96A;margin-bottom:5px;border-bottom:1px solid rgba(255,255,255,.05);padding-bottom:4px">📋 ${lang==='ar'?'الخطوات':'Steps'}</div>`
   +clean.slice(0,8).map((s,i)=>`<div class="st"><div class="stn">${i+1}</div><div style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ic[s.maneuver?.type]||'▶'} ${s.name||'...'}</div><div class="std">${s.distance<1000?Math.round(s.distance)+'م':(s.distance/1000).toFixed(1)+'كم'}</div></div>`).join('');
}
function addPt(ll,e,lbl){
  const ic=L.divIcon({html:`<div style="font-size:24px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.9))">${e}</div>`,className:'',iconSize:[30,30],iconAnchor:[15,15]});
  routePts.push(L.marker(ll,{icon:ic,zIndexOffset:800}).addTo(map)
    .bindTooltip(lbl,{permanent:true,direction:'top',className:'mtt',offset:[0,-18]}));
}
function clearRouteLines(){
  routeLines.forEach(l=>map.removeLayer(l));routeLines=[];
  routePts.forEach(l=>map.removeLayer(l));routePts=[];
  document.getElementById('rr').style.display='none';
  document.getElementById('rsteps').style.display='none';
  [document.getElementById('rp-go'),document.getElementById('r2-go')].forEach(b=>{if(b){b.textContent=t('go');b.disabled=false;}});
}
function clearRoute(){clearRouteLines();toast(lang==='ar'?'🗑️ تم مسح المسار':'🗑️ Cleared');}

// ══════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════
function fDist(d){return d<1000?Math.round(d)+' '+t('m'):(d/1000).toFixed(1)+' '+t('km');}
function fTime(s){const m=Math.round(s/60);return m<60?m+' '+t('min'):Math.floor(m/60)+t('hr')+' '+(m%60)+t('min');}

// ══════════════════════════════════════════════════════
// UI
// ══════════════════════════════════════════════════════
let panelOpen=false, rpOpen=false, activeTab='camp';
function togglePanel(tab){
  if(panelOpen&&activeTab===tab){closePanel();return;}
  panelOpen=true;
  document.getElementById('panel').classList.add('open');
  document.getElementById('panel-ov').style.display='block';
  if(tab)ptab(tab,document.getElementById('pt-'+tab));
  setTimeout(()=>map.invalidateSize(),300);
}
function closePanel(){
  panelOpen=false;
  document.getElementById('panel').classList.remove('open');
  document.getElementById('panel-ov').style.display='none';
  setTimeout(()=>map.invalidateSize(),300);
}
function ptab(tab,btn){
  activeTab=tab;
  ['camp','places','route'].forEach(tv=>{
    document.getElementById('pv-'+tv).style.display=tv===tab?'flex':'none';
    document.getElementById('pt-'+tv).classList.toggle('on',tv===tab);
  });
}
function showRP(){rpOpen=true;document.getElementById('rp').classList.add('show');}
function centerCurrent(){map.flyTo(currentSite==='mina'?MINA_CENTER:ARAFAT_CENTER,14,{duration:1.4});}
function bbC(tab,btn){document.querySelectorAll('.bb:not(.bb-gmap)').forEach(b=>b.classList.remove('on'));btn.classList.add('on');}
function showSOS(){
  alert(lang==='ar'
    ?'🆘 أرقام الطوارئ بالمشاعر المقدسة\n\n🚨 الطوارئ الموحد: 911\n🚒 الدفاع المدني: 998\n🚑 الإسعاف: 997\n👮 الشرطة: 999\n🏥 وزارة الصحة: 937\n📞 وزارة الحج: 920001814'
    :'🆘 Emergency Numbers in Holy Sites\n\n🚨 Unified Emergency: 911\n🚒 Civil Defense: 998\n🚑 Ambulance: 997\n👮 Police: 999\n🏥 MOH Hotline: 937\n📞 Min. of Hajj: 920001814'
  );
}
let toastT;
function toast(msg,dur=3500){
  const el=document.getElementById('toast');
  el.textContent=msg;el.style.opacity='1';
  clearTimeout(toastT);toastT=setTimeout(()=>el.style.opacity='0',dur);
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  try{
    initMap();
    // Restore saved camps
    const ms=localStorage.getItem('mina_camp_mina');
    const as=localStorage.getItem('mina_camp_arafat');
    const saved=ms||as;
    if(saved){try{restoreSaved(JSON.parse(saved));}catch(e){}}
    setTimeout(()=>toast(lang==='ar'?'🕋 منى · ⛰️ عرفات · اختر المشعر من الأعلى':'🕋 Mina · ⛰️ Arafat · Select a site above',5000),900);
  }catch(e){console.error(e);}
  document.addEventListener('click',e=>{
    if(!e.target.closest('#search-box')&&!e.target.closest('#s-results')) clearSearch();
  });
});
